<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Plump Online</title>
  <style>
    body { font-family: sans-serif; background: #0b1724; color: #f5f5f5; margin: 0; padding: 0; }
    #app { max-width: 900px; margin: 0 auto; padding: 16px; }
    .card { display: inline-block; padding: 6px 10px; margin: 4px; border-radius: 4px; background: #fff; color: #000; cursor: pointer; }
    .card.heart, .card.diamond { color: #c00; }
    .hand { margin-top: 8px; }
    .btn { padding: 6px 10px; margin: 4px; cursor: pointer; border-radius: 4px; border: none; background: #1e88e5; color: #fff; }
    .btn:disabled { background: #555; cursor: default; }
    .row { margin-bottom: 8px; }
    input { padding: 4px 6px; margin: 2px; }
    .player-list { margin-top: 8px; }
    .player { margin-bottom: 4px; }
    .highlight { font-weight: bold; color: #ffeb3b; }
    .trick { margin-top: 8px; padding: 8px; background: #111827; border-radius: 4px; }
  </style>
</head>
<body>
<div id="app">
  <h1>Plump</h1>

  <div id="connectionView">
    <div class="row">
      <label>Namn: <input id="nameInput" placeholder="Ditt namn"></label>
    </div>
    <div class="row">
      <button class="btn" id="createLobbyBtn">Skapa lobby</button>
      <label>Lobbykod: <input id="lobbyCodeInput" placeholder="ABC12" style="width:80px;"></label>
      <button class="btn" id="joinLobbyBtn">Gå med</button>
    </div>
    <div class="row">
      <label>Max spelare: <input id="maxPlayersInput" type="number" value="5" min="2" max="8" style="width:60px;"></label>
    </div>
    <div id="connError" style="color:#ff5252;"></div>
  </div>

  <div id="lobbyView" style="display:none;">
    <h2>Lobby <span id="lobbyIdLabel"></span></h2>
    <div class="player-list" id="playerList"></div>
    <div id="lobbyInfo"></div>
    <button class="btn" id="startGameBtn">Starta spel</button>
  </div>

  <div id="gameView" style="display:none;">
    <h2>Lobby <span id="gameLobbyIdLabel"></span></h2>
    <div id="gameStatus"></div>
    <div id="biddingView" style="margin-top:8px;"></div>
    <div id="playView" style="margin-top:8px;"></div>
    <div id="roundInfo" style="margin-top:8px;"></div>
    <div id="scoreBoard" style="margin-top:8px;"></div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"
        integrity="sha384-2ZQ0jrISFRCGDpa2BkLomqKgJo0vvArkH5AO9M/dwZ0pniS3pSkeCZMt2rt7AzGx"
        crossorigin="anonymous"></script>
<script src="client.js"></script>
</body>
</html>
